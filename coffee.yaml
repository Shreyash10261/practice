coffee_type: coffee  #inline comment
temperature: hot
servings: 2
brewing_time: 5

first_recepie:
  base: coffee_bean
  milk: whole_milk

first_recepie_2:
  base: large_coffee_bean
  milk: whole_milk


coffee_name: classic coffee #data-type starting
description: "CLASSIC COFFEE IS THE MOST BASIC TYPE OF A COFFEE"
tagline: 'Most loved Coffee'

brewing_instruction: |
  boil water
  add coffee beans
  add milk

brewing_instruction_two: >
  boil water
  add coffee beans
  add milk

